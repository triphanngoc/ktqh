<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Under Development</title>
    <style>
      :root {
        --bg-1: #0f172a;
        --bg-2: #1e293b;
        --card: rgba(15, 23, 42, 0.7);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #1d4ed8 0%, transparent 35%),
          radial-gradient(circle at bottom right, #0ea5e9 0%, transparent 30%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .container {
        width: min(90vw, 720px);
        padding: 2.5rem;
        border-radius: 20px;
        background: var(--card);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.45);
        backdrop-filter: blur(8px);
      }

      .badge {
        display: inline-block;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #082f49;
        background: linear-gradient(90deg, #67e8f9, #38bdf8);
      }

      h1 {
        margin: 1rem 0 0.75rem;
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .progress {
        margin-top: 1.5rem;
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.2);
        overflow: hidden;
      }

      .progress span {
        display: block;
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #22d3ee, var(--accent));
        animation: progress-move 2.2s ease-in-out infinite alternate;
      }

      @keyframes progress-move {
        from {
          transform: translateX(0%);
        }

        to {
          transform: translateX(150%);
        }
      }
    </style>
  </head>
  <body>
    <main class="container" aria-live="polite">
      <span class="badge">Coming Soon</span>
      <h1>This website is under development.</h1>
      <p>
        We’re crafting a better experience for you. Please check back soon for
        updates.
      </p>
      <div class="progress" role="img" aria-label="Development progress">
        <span></span>
      </div>
    </main>
  </body>
</html>
